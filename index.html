<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>모바일 신분증</title>

<style>
body {
  margin:0;
  background:#f4f5f7;
  font-family:-apple-system, BlinkMacSystemFont;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 상단 탭 */
.tabs {
  width:100%;
  max-width:420px;
  display:flex;
  background:white;
  padding:12px 16px;
  font-weight:600;
  border-bottom:1px solid #e5e5e5;
}
.tabs div {
  margin-right:20px;
  opacity:0.4;
}
.tabs .active {
  opacity:1;
  border-bottom:2px solid black;
  padding-bottom:4px;
}

/* 카드 */
.card {
  width:92%;
  max-width:420px;
  aspect-ratio: 9/16;
  margin:40px auto;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  position:relative;
  display:flex;
  flex-direction:column;
  transform: scale(0.8);
  transform-origin: top center;
}

/* 사진 */
.profile {
  width:180px;
  height:220px;
  border-radius:10px;
  object-fit:cover;
  margin:0 auto;
}

/* 이름 */
.name {
  font-size:33px;
  font-weight:700;
  margin-top:10px;
  text-align:left;
}

/* 정보 */
.info {
  font-size:21px;
  margin-top:6px;
  line-height:1.6;
  text-align:left;
}

/* 주민등록번호 부분 */
.reg-num {
  display:flex;
  gap:4px;
}
.reg-num .date {
  font-weight:600;
}
.reg-num .number {
  transition: opacity 0.3s;
}

/* 주소 */
#addr {
  display:inline-block;
}

/* 생일 */
.birth {
  font-size:26px;
  transition: opacity 0.3s;
}

/* 연한 글씨 */
.light {
  font-size:18px;
  color:#aaa;
  margin-top:6px;
  text-align:left;
  transition: opacity 0.3s;
}

/* 스위치 */
.switch {
  position:absolute;
  right:20px;
  top:270px;
}
.switch input { display:none; }

.slider {
  width:50px;
  height:26px;
  background:#d9d9d9;
  border-radius:30px;
  position:relative;
}
.slider::before {
  content:"";
  width:22px;
  height:22px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:2px;
  left:3px;
  transition:0.25s;
}
input:checked + .slider {
  background:black;
}
input:checked + .slider::before {
  transform:translateX(24px);
}

/* 시간 */
.time {
  font-size:16px;
  margin-top:5px;
  color:#777;
  text-align:left;
  transition: opacity 0.3s;
}
.sec {
  color:#4FC3F7;
}

/* 초 막대 */
.bar {
  width:100%;
  height:6px;
  background:#e5e5e5;
  border-radius:10px;
  margin-top:6px;
  overflow:hidden;
  transition: opacity 0.3s;
}
.bar-inner {
  height:100%;
  width:100%;
  background: linear-gradient(to right, #4FC3F7, #9C27B0);
  transition:width 1s linear, opacity 0.3s;
}

/* 버튼 */
.btn {
  margin-top:12px;
  background:black;
  color:white;
  padding:12px;
  text-align:center;
  border-radius:10px;
  font-size:16px;
  font-weight:600;
}

/* QR */
.qr {
  display:none;
  position:absolute;
  top:50%;
  left:50%;
  transform: translate(-50%, -50%) translate(90px, 30px);
}
.qr img {
  width:150px;
}
</style>
</head>

<body>

<div class="tabs">
  <div class="active">주민등록증</div>
  <div>운전면허증</div>
</div>

<div class="card">

  <img class="profile" src="https://i.imgur.com/Uf7qgkk.jpeg">

  <div class="name">전지민</div>

  <!-- 정보 -->
  <div id="infoBlock">
    <div class="info">
      <div class="reg-num">
        <span class="date">060923</span>
        <span class="number" id="regNumber">- 3173611</span>
      </div>
      <div id="addr">경기도 양주시 옥정동</div>
      <div class="birth" id="birth">24.12.31</div>
    </div>
    <div class="light" id="lightText">경기도 양주시장</div>
  </div>

  <!-- QR -->
  <div class="qr" id="qrBox">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=random">
  </div>

  <!-- 스위치 -->
  <div class="switch" id="switchBlock">
    <label>
      <input type="checkbox" id="toggle" onchange="toggleAddr()">
      <div class="slider"></div>
    </label>
  </div>

  <!-- 시간 + 바 -->
  <div id="timeBlock">
    <div class="time" id="timeArea">
      남은시간 <span class="sec" id="sec">30초</span>
      <div class="bar">
        <div class="bar-inner" id="bar"></div>
      </div>
    </div>
  </div>

  <div class="btn" onclick="showQR()">QR정보 표시</div>

</div>

<script>
let time = 30;

setInterval(()=>{
  time--;
  if(time < 0) time = 30;

  document.getElementById("sec").innerText = time + "초";

  let percent = (time / 30) * 100;
  document.getElementById("bar").style.width = percent + "%";
},1000);

function toggleAddr(){
  let toggle = document.getElementById("toggle");
  let addr = document.getElementById("addr");

  if(toggle.checked){
    addr.innerText = "경기도 양주시 옥정동로 212 제일풍경채레이크시티 101동 202호";
  } else {
    addr.innerText = "경기도 양주시 옥정동";
  }
}

function showQR(){
  let qr = document.getElementById("qrBox");
  let switchBlock = document.getElementById("switchBlock");

  // 투명 처리할 요소들
  let regNumber = document.getElementById("regNumber"); // - 3173611
  let birth = document.getElementById("birth");
  let lightText = document.getElementById("lightText");
  let timeArea = document.getElementById("timeArea");

  if(qr.style.display === "block"){
    qr.style.display = "none";
    switchBlock.style.display = "block";

    regNumber.style.opacity = "1";
    birth.style.opacity = "1";
    lightText.style.opacity = "1";
    timeArea.style.opacity = "1";
  } else {
    qr.style.display = "block";
    switchBlock.style.display = "none";

    regNumber.style.opacity = "0"; // 3173611만 투명
    birth.style.opacity = "0";
    lightText.style.opacity = "0";
    timeArea.style.opacity = "0";
  }
}
</script>

</body>
</html>
